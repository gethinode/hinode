comment: >-
  Generates terminal output for bash, powershell, or sql shell languages.
icon: terminal
arguments:
  user:
  host:
  prompt:
  shell:
    preview: true
  class:
body:
  type: string
  optional: false
  comment: >-
    The shell commands and their output. Start a line with `(out)` to specify
    an output line. Use the following line continuation characters for each
    supported language:
     - bash: backslash symbol
     - PowerShell: backtick symbol
     - sql: `(con)` line suffix
