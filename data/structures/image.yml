comment: >-
  Displays a responsive image with an optional aspect ratio. Local and remote
  images are automatically resized and converted to the WebP format.
icon: image
arguments:
  src:
    type: string
    optional: true
    position: 0
    preview: true
  page:
    optional: true
  mode:
  ratio:
  portrait:
    release: v0.18.3
  loading:
    release: v0.21.0
  priority:
  sizes:
    group: partial
  title:
  caption:
  wrapper:
    release: v0.18.3
  class:
  figclass:
    release: v0.23.0
  plain:
    release: v0.24.0
  anchor:
    release: v0.24.22
  image-height:
    release: v1.0.0
  image-width:
    release: v1.0.0
  # deprecated arguments
  url:
    type:
      - string
      - template.URL
    optional: true
    comment: >-
      Path or url of the image, e.g. `img/example.jpg`. Images with multiple
      color modes are expected to have a basename that ends with either `-dark`
      or `-light`.
    deprecated: v1.0.0
    alternative: src
example: |
  {{< image src="img/example.jpg" ratio="16x9" caption="Example caption" >}}
