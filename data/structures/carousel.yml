comment: >-
  Displays a carousel of several images. Add carousel-item inner elements to
  define the individual image slides.
icon: view_carousel
children:
  - carousel-item
arguments:
  id:
  ratio:
    preview: true
  portrait:
    release: v0.18.3
  class:
example: |
  {{< carousel ratio="16x9" >}}
    {{< carousel-item src="img/slide1.jpg" caption="First slide" active="true" >}}
    {{< carousel-item src="img/slide2.jpg" caption="Second slide" >}}
  {{< /carousel >}}
body:
  type: string
  optional: false
  comment: Inner `img` elements that define the individual image slides.