comment: >-
  Displays a tooltip for a hyperlink. The inner content is used as the link
  text.
icon: tooltip
arguments:
  title:
    preview: true
  href:
  class:
  color:
    default: dark
  placement:
  spacing:
    default: false
body:
  optional: false
  comment: Hyperlink text.
example: |
  {{< tooltip title="Tooltip text" href="/docs/" >}}Hover over me{{< /tooltip >}}
