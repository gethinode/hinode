comment: >-
  Generates a hyperlink for a named link, URL, or internal reference. Any inner
  text is used as the link title.
icon: link
arguments:
  page:
  href:
    position: 0
    preview: true
  cue:
  tab:
  case:
  external:
  force:
    release: v0.27.20
  class:
  text:
    optional: true
    group: partial
  title:
    release: v0.26.0
  position:
    group: partial
    optional: true
    release: v1.0.0
  exact:
    release: v1.20.0
  skip-validation:
    type: bool
    optional: true
    group: partial
    comment: Skip internal link validation (use for dynamic content).
    release: v2.0.0
  # deprecated arguments
  destination:
    type: string
    optional: true
    group: partial
    comment: Target destination.
    deprecated: v1.0.0
    alternative: href
  name:
    type: string
    optional: true
    comment: Alias of href.
    deprecated: v1.0.0
    alternative: href
  url:
    type: string
    optional: true
    comment: Alias of href.
    deprecated: v1.0.0
    alternative: href
body:
  type: string
  optional: true
  group: shortcode
  comment: Link description.
