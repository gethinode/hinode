comment: >-
  Use the abbr shortcode to show the long form of an abbreviation. The
  abbreviation data is centrally stored in a data file with translation support.
icon: spellcheck
arguments:
  key:
    type: string
    position: 0
    optional: false
    preview: true
    comment: >-
      Case-insensitive key of the abbreviation. In shorthand notation, this is
      the first (and only) matched argument. Non-alphanumeric keys must be quoted.
  data:
    type: string
    default: abbr
    optional: true
    comment: >-
      Filename of the abbreviation input. You can omit the file extension. The
      file should reside in the `data` folder. The data supports language
      extensions. For example, `abbr.en.yaml` refers to the English translation
      of the abbreviation data. The filename `abbr.yaml` is used when no suitable
      translation is found.
  class:
    type: string
    optional: true
    comment: >-
      Class attribute of the abbr element. For example, specify `initialism` for
      a slightly smaller font size.
example: |
  {{< abbr HTML >}}
