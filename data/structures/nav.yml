comment: >-
  Displays a tab group of multiple items. Add nav-item inner elements for each
  tab pane.
icon: view_list
children:
  - nav-item
arguments:
  id:
  page:
    group: partial
  list:
    group: partial
  nav-disabled:
    release: v1.0.0
  nav-icons:
    release: v2.7.0
    group: partial
  nav-item-attrs:
    release: v2.7.0
    group: partial
  nav-items:
    release: v1.0.0
  nav-show:
    release: v1.0.0
  nav-titles:
    release: v1.0.0
  tab-type:
    release: v1.0.0
    preview: true
  align:
    release: v2.7.0
    comment: >-
      Horizontal alignment of the nav controls. Ignored when vertical is set.
  controls-placement:
    release: v2.7.0
    comment: >-
      Position of the nav controls relative to the content panes ("top" or
      "bottom"). Ignored when vertical is set.
  attributes:
    release: v2.7.0
  vertical:
  word-wrap:
    release: v1.0.0
  class:
  pane:
  responsive:
    release: v1.4.0
  width:
    default: 12
    group: partial
  # deprecated arguments
  type:
    type: select
    optional: true
    comment: Type of the tab group.
    options:
      values:
        - tabs
        - pills
        - underline
        - callout
    deprecated: v1.0.0
    alternative: tab-type
  wrap:
    type: bool
    default: false
    optional: true
    comment: Flag to enable word wrapping of tab titles.
    deprecated: v1.0.0
    alternative: word-wrap
body:
  type: string
  optional: false
  group: shortcode
  comment: Inner <nav-item> elements for each tab or pill.
example: |
  {{< nav tab-type="tabs" id="tabs-example" >}}
    {{< nav-item title="Tab #1" show="true" >}}
      Content of the first tab pane.
    {{< /nav-item >}}
    {{< nav-item title="Tab #2" >}}
      Content of the second tab pane.
    {{< /nav-item >}}
  {{< /nav >}}
