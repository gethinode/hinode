comment: >-
  Renders the sidebar navigation of a single page, typically used in
  documentation sections. On smaller screens it is replaced with an offcanvas element.
group: partial
arguments:
  page:
    type:
      - '*hugolib.pageState'
      - '*hugolib.pageForShortcode'
    optional: false
    comment: Context of the current page.
    group: partial
  menu:
    type: '[]interface {}'
    optional: true
    comment: Path of the sidebar navigation menu.
  version:
    type: string
    optional: true
    comment: >-
      Version of the sidebar navigation, used to define the base URL of
      generated links, together with the page's section.
  auto-generate:
    type: bool
    optional: true
    default: false
    comment: >-
      Flag to auto-generate the content of the sidebar. When set, the sidebar
      lists all pages of the current section. Use `nested`, `reverse`, and
      `sort` arguments to refine the behavior.
    release: v2.0.0
  nested:
    default: true
    release: v2.0.0
  reverse:
    default: false
    release: v2.0.0
  sort:
    optional: true
    default: weight
    release: v2.0.0
