# toml-docs-start main
title = "Hinode"
copyright = "Copyright © 2026 Hinode Team"
enableGitInfo = true
# toml-docs-end main

# additional settings
baseURL = "https://example.com/"
canonifyURLs = false
enableEmoji = true
enableRobotsTXT = true
enableInlineShortcodes = true
summaryLength = 20

# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

# toml-docs-start timeout
timeout = "180s"
# toml-docs-end timeout

# toml-docs-start language
languageCode = "en-us"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
# toml-docs-end language

# toml-docs-start headers
[outputFormats]
  [outputFormats.server]
    mediaType = "application/toml"
    baseName = "server"
    isPlainText = true
    notAlternative = true
    permalinkable = true
    root = true
  [outputFormats.netlify]
    mediaType = "application/toml"
    baseName = "netlify"
    isPlainText = true
    notAlternative = true
    permalinkable = true
    root = true
# toml-docs-end headers

  [outputFormats.XML]
    isPlainText = false
    mediaType = "application/xml"
    isHtml = false
    noUgly = true
    permalinkable = false
    name = "xml"

# toml-docs-start redirect
  [outputFormats.REDIR]
    mediaType = "text/netlify"
    baseName = "_redirects"
    isPlainText = true
    notAlternative = true
  [outputFormats.searchindex]
    mediaType = "application/json"
    baseName = "flexsearch-index"
    isPlainText = true
    notAlternative = true
    permalinkable = true

[mediaTypes."text/netlify"]
delimiter = ""
# toml-docs-end redirect

# toml-docs-start outputs
[outputs]
home = ["HTML", "RSS", "REDIR", "netlify", "server", "searchindex"]
# toml-docs-end outputs

# toml-docs-start build
[build]
  [build.buildStats]
    enable = true
# toml-docs-end build
  
[taxonomies]
  tag = 'tags'

[pagination]
  pagerSize = 9

[privacy]
  [privacy.vimeo]
    disabled = false
    simple = true

  [privacy.x]
    disabled = false
    enableDNT = true
    simple = true

  [privacy.instagram]
    disabled = false
    simple = true

  [privacy.youtube]
    disabled = false
    privacyEnhanced = true

[services]
  [services.instagram]
    disableInlineCSS = true
  [services.x]
    disableInlineCSS = true
  [services.googleAnalytics]
    # ID = "G-xxxxxxxxxx"

[minify]
  [minify.tdewolff.js]
    precision = 0
    version = 2022
  [minify.tdewolff.html]
    keepWhitespace = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.146.0"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "i18n"
    target = "i18n"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "netlify.toml"
    target = "assets/config/netlify.toml"
# toml-docs-start modules
  [[module.imports]]
    path = "github.com/gethinode/mod-bootstrap"
  [[module.imports]]
    path = "github.com/gethinode/mod-csp"
  [[module.imports]]
    path = "github.com/gethinode/mod-flexsearch/v5"
  [[module.imports]]
    path = "github.com/gethinode/mod-fontawesome/v6"
  [[module.imports]]
    path = "github.com/gethinode/mod-google-analytics/v2"
  [[module.imports]]
    path = "github.com/gethinode/mod-katex"
  [[module.imports]]
    path = "github.com/gethinode/mod-leaflet/v3"
  [[module.imports]]
    path = "github.com/gethinode/mod-lottie/v3"
  [[module.imports]]
    path = "github.com/gethinode/mod-mermaid/v5"
  [[module.imports]]
    path = "github.com/gethinode/mod-simple-datatables/v4"
  [[module.imports]]
    path = "github.com/gethinode/mod-utils/v6"
# toml-docs-end modules

# toml-docs-start segments
[segments]
  [segments.headers]
    [[segments.headers.includes]]
       kind = '{home}'
       output = '{netlify,server}'
# toml-docs-end segments

# toml-docs-start caches
[caches]
  # Hugo caches remote resources forever by default, and the Netlify cache plugin carries that
  # cache across builds. The preview component reads a target's response headers to decide whether
  # it can be embedded, so a stale entry pins the verdict to whatever the target sent the first
  # time it was fetched: correcting a target's CSP then no longer takes effect on a rebuild.
  # Builds are further apart than this, so headers are re-read on every build while still being
  # fetched only once within one.
  [caches.getresource]
    maxAge = "5m"
# toml-docs-end caches
